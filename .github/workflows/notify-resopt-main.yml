name: Notify resopt-main

# Tells brasjo/resopt-main to re-run its install test against this repo's
# latest main, since resopt-main clones this repo as part of its install.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # Temporarily verbose (no -s/-f, explicit status code) to see the
      # actual GitHub API response instead of guessing why the dispatch
      # isn't triggering resopt-main - revert to quiet -sf once diagnosed.
      - name: Fire module-updated repository_dispatch on resopt-main
        env:
          TOKEN: ${{ secrets.RESOPT_MAIN_DISPATCH_TOKEN }}
        run: |
          echo "Token length: ${#TOKEN}"
          curl -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -w "\nHTTP status: %{http_code}\n" \
            https://api.github.com/repos/brasjo/resopt-main/dispatches \
            -d "{\"event_type\":\"module-updated\",\"client_payload\":{\"repository\":\"${GITHUB_REPOSITORY}\",\"sha\":\"${GITHUB_SHA}\"}}"
