{% load static %}
<div id="drop-area">
    <p>Drag & drop files here or click</p>
    <input type="file" id="fileElem" multiple style="display: none;">
    <button onclick="document.getElementById('fileElem').click()">
        <div class="icon-container">
            {% include "icons/upload_file.svg" with title="Upload" alt="Upload" %}
            Upload Files
        </div>
    </button>
    <ul id="file-list"></ul>
</div>
<style>
#drop-area {
  display: flex;
  min-width: 400px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px dashed #ccc;
}
</style>
